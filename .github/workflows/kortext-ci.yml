name: Kortext CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (frontend + server)
        run: npm run typecheck

      - name: Test (vitest run)
        run: npm test

      - name: Build (server + web)
        run: npm run build

      # Sanity smoke: the compiled CLI must run on a clean machine.
      # build-verification.test.ts covers the same path inside vitest;
      # the explicit step protects against the "build succeeded but
      # binary broken" failure mode if the test ever gets reorganised.
      - name: Smoke (compiled CLI version)
        run: node dist/bin/kortext.js --version
