<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Persona Icons — Sizes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0814; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 48px; }
  h1 { color: #fff; font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #6B6577; font-size: 12px; margin-bottom: 40px; }
  .section { margin-bottom: 44px; }
  .size-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: #4B4560; margin-bottom: 20px;
    font-family: monospace;
  }
  .row { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; }
  .chip {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .chip-name {
    font-family: monospace; font-size: 9px; color: #6B6577;
    text-align: center; line-height: 1.4; max-width: 72px;
  }
  .avatar {
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<h1>Persona İkonları</h1>
<p class="subtitle">Her ajan — 16 × 16 / 24 × 24 / 32 × 32</p>

<div id="root"></div>

<script>
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}
function rgba(hex, a) {
  const { r, g, b } = hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}

const personas = [
  { handle: '+prime',               color: '#F59E0B',
    svg: `<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>` },
  { handle: '+operation-manager',   color: '#67E8F9',
    svg: `<path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/>` },
  { handle: '+product-manager',     color: '#60A5FA',
    svg: `<path d="M12 13V2l8 4-8 4"/><path d="M20.55 10.23A9 9 0 1 1 8 4.94"/>` },
  { handle: '+engineering-manager', color: '#C084FC',
    svg: `<path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/>` },
  { handle: '+delivery-manager',    color: '#FB923C',
    svg: `<path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>` },
  { handle: '+backend-developer',   color: '#818CF8',
    svg: `<rect width="20" height="8" x="2" y="2" rx="2"/><rect width="20" height="8" x="2" y="14" rx="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/>` },
  { handle: '+frontend-developer',  color: '#F472B6',
    svg: `<rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/>` },
  { handle: '+db-admin',            color: '#2DD4BF',
    svg: `<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/>` },
  { handle: '+qa-engineer',         color: '#FACC15',
    svg: `<path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/>` },
  { handle: '+security-engineer',   color: '#DC2626',
    svg: `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>` },
  { handle: '+devops-engineer',     color: '#F87171',
    svg: `<rect width="8" height="8" x="3" y="3" rx="2"/><path d="M7 11v4a2 2 0 0 0 2 2h4"/><rect width="8" height="8" x="13" y="13" rx="2"/>` },
  { handle: '+designer',            color: '#34D399',
    svg: `<circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>` },
  { handle: '+copywriter',          color: '#A3E635',
    svg: `<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>` },
  { handle: '+growth-expert',       color: '#FB7185',
    svg: `<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>` },
  { handle: '+compliance-expert',   color: '#22D3EE',
    svg: `<path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/>` },
];

const sizes = [
  { px: 16, iconPx: 9,  stroke: 1.8, borderPx: 1.5, label: '16 × 16' },
  { px: 24, iconPx: 13, stroke: 2,   borderPx: 1.5, label: '24 × 24' },
  { px: 32, iconPx: 18, stroke: 2,   borderPx: 2,   label: '32 × 32' },
];

const root = document.getElementById('root');

sizes.forEach(size => {
  const section = document.createElement('div');
  section.className = 'section';
  section.innerHTML = `<div class="size-label">${size.label}</div>`;

  const row = document.createElement('div');
  row.className = 'row';

  personas.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'chip';

    const shortName = p.handle.replace('+', '').replace(/-/g, '-​');

    chip.innerHTML = `
      <div class="avatar" style="
        width:${size.px}px; height:${size.px}px;
        background:${rgba(p.color, 0.1)};
        border:${size.borderPx}px solid ${rgba(p.color, 0.65)};
      ">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="${size.iconPx}" height="${size.iconPx}"
          viewBox="0 0 24 24"
          fill="none"
          stroke="${p.color}"
          stroke-width="${size.stroke}"
          stroke-linecap="round"
          stroke-linejoin="round"
        >${p.svg}</svg>
      </div>
      <div class="chip-name">${shortName}</div>
    `;

    row.appendChild(chip);
  });

  section.appendChild(row);
  root.appendChild(section);
});
</script>
</body>
</html>
